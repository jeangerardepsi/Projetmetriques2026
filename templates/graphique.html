<!DOCTYPE html>
<html>
<head>
    <title>Mon Graphique de Températures</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        // On récupère les données depuis ton API Flask (/api/paris)
        fetch('/paris')
          .then(response => response.json())
          .then(data => {
            var dataTable = new google.visualization.DataTable();
            dataTable.addColumn('string', 'Heure');
            dataTable.addColumn('number', 'Température (°C)');

            // On ajoute chaque ligne de données reçue
            data.forEach(item => {
              dataTable.addRow([item.heure, item.temp]);
            });

            var options = {
              title: 'Températures à Paris (Données en temps réel)',
              curveType: 'function', // Pour avoir une courbe lisse
              legend: { position: 'bottom' },
              colors: ['#1c91ff'], // Une jolie couleur bleue
              pointSize: 5
            };

            var chart = new google.visualization.LineChart(document.getElementById('curve_chart'));
            chart.draw(dataTable, options);
          });
      }
    </script>
</head>
<body style="font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f4f4f9;">
    <h1 style="margin-top: 50px;">Tableau de Bord Métriques</h1>
    <div id="curve_chart" style="width: 900px; height: 500px; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); background: white;"></div>
</body>
</html>
