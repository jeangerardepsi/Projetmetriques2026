<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);
      function drawChart() {
        fetch('/api/paris')
          .then(response => response.json())
          .then(data => {
            var dataTable = new google.visualization.DataTable();
            dataTable.addColumn('string', 'Heure');
            dataTable.addColumn('number', 'Température (°C)');
            data.forEach(item => { dataTable.addRow([item.heure, item.temp]); });
            var options = { title: 'Métriques : Température à Paris', curveType: 'function', legend: { position: 'bottom' } };
            var chart = new google.visualization.LineChart(document.getElementById('curve_chart'));
            chart.draw(dataTable, options);
          });
      }
    </script>
</head>
<body>
    <h1>Graphique des Températures</h1>
    <div id="curve_chart" style="width: 900px; height: 500px"></div>
</body>
</html>
